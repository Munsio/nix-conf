name: OpenCode Update

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check for new release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST=$(gh api repos/anomalyco/opencode/releases/latest --jq '.tag_name')
          CURRENT=$(grep -oP 'opencodeVersion\s*=\s*"\K[^"]+' modules/overlays.nix)
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "Already up to date ($CURRENT)."
            echo "up_to_date=true" >> $GITHUB_OUTPUT
          else
            echo "Update needed: $CURRENT -> $LATEST"
            echo "up_to_date=false" >> $GITHUB_OUTPUT
          fi

      - name: Update version and compute opencodeHash
        if: steps.check.outputs.up_to_date == 'false'
        id: hash
        run: |
          LATEST="${{ steps.check.outputs.latest }}"
          CURRENT="${{ steps.check.outputs.current }}"
          VER="${LATEST#v}"
          sed -i "s/opencodeVersion = \"$CURRENT\"/opencodeVersion = \"$VER\"/" modules/overlays.nix

          TMP=$(mktemp -d)
          curl -sL "https://github.com/anomalyco/opencode/archive/$LATEST.tar.gz" | tar xz -C "$TMP"
          cd "$TMP"/opencode-*
          nix shell nixpkgs#bun --command bun install
          NEW_HASH=$(nix hash path "$(pwd)/node_modules" --type sha256 --sri)
          cd "$OLDPWD"
          rm -rf "$TMP"

          sed -i "s|opencodeHash = \".*\"|opencodeHash = \"$NEW_HASH\"|" modules/overlays.nix
          echo "hash=$NEW_HASH" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.check.outputs.up_to_date == 'false'
        uses: peter-evans/create-pull-request@v8
        with:
          title: "opencode: ${{ steps.check.outputs.current }} -> ${{ steps.check.outputs.latest }}"
          body: |
            Auto-generated update.

            - Version: `${{ steps.check.outputs.current }}` → `${{ steps.check.outputs.latest }}`
            - Node modules hash: `${{ steps.hash.outputs.hash }}`
          branch: auto/opencode-update
          commit-message: "opencode: ${{ steps.check.outputs.current }} → ${{ steps.check.outputs.latest }}"
