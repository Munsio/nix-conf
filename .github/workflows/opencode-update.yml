name: OpenCode Update

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v22
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check for new release
        id: check
        run: |
          LATEST=$(curl -s https://api.github.com/repos/anomalyco/opencode/releases/latest | jq -r '.tag_name')
          CURRENT=$(grep -oP 'opencodeVersion\s*=\s*"\K[^"]+' modules/overlays.nix)
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "Already up to date ($CURRENT)."
            echo "up_to_date=true" >> $GITHUB_OUTPUT
          else
            echo "Update needed: $CURRENT -> $LATEST"
            echo "up_to_date=false" >> $GITHUB_OUTPUT
          fi

      - name: Update version and flake lock
        if: steps.check.outputs.up_to_date == 'false'
        run: |
          LATEST="${{ steps.check.outputs.latest }}"
          CURRENT="${{ steps.check.outputs.current }}"
          sed -i "s/opencodeVersion = \"$CURRENT\"/opencodeVersion = \"$LATEST\"/" modules/overlays.nix
          nix flake lock --override-input opencode-src "github:anomalyco/opencode?ref=$LATEST"

      - name: Compute new hash
        if: steps.check.outputs.up_to_date == 'false'
        id: hash
        run: |
          DUMMY="sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
          sed -i "s/opencodeHash = \".*\"/opencodeHash = \"$DUMMY\"/" modules/overlays.nix
          BUILD_OUTPUT=$(nix build --no-link .#nixosConfigurations.whirl.config.system.build.toplevel 2>&1 || true)
          NEW_HASH=$(echo "$BUILD_OUTPUT" | grep -oP 'got:\s+\Ksha256-\S+')
          if [ -z "$NEW_HASH" ]; then
            echo "Failed to extract hash from build output:"
            echo "$BUILD_OUTPUT"
            exit 1
          fi
          sed -i "s/opencodeHash = \"$DUMMY\"/opencodeHash = \"$NEW_HASH\"/" modules/overlays.nix
          echo "hash=$NEW_HASH" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.check.outputs.up_to_date == 'false'
        uses: peter-evans/create-pull-request@v6
        with:
          title: "opencode: ${{ steps.check.outputs.current }} -> ${{ steps.check.outputs.latest }}"
          body: |
            Auto-generated update.

            - Version: `${{ steps.check.outputs.current }}` → `${{ steps.check.outputs.latest }}`
            - Node modules hash: `${{ steps.hash.outputs.hash }}`
          branch: auto/opencode-update
          commit-message: "opencode: ${{ steps.check.outputs.current }} → ${{ steps.check.outputs.latest }}"
